<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Internship Evaluation</title>
    <link rel="stylesheet" href="global_styles.css">
    <link rel="stylesheet" href="evaluation_style.css">
    <style>
    </style>
</head>

<body>
    <div class="evaluation-page-wrapper">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">University of Nottingham</h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="dashboard.html">DASHBOARD</a></li>
                    <li><a href="list.html" id="listLinkNav">LIST</a></li>
                    <li><a href="evaluation.html" style="color: cyan;">EVALUATION</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </div>
            <div class="login">
                <button class="login_btn" id="loginBtn">LOGIN</button>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="username" id="usernameDisplay"></span>
                    <span class="user-role" id="userRoleDisplay"></span>
                </div>
            </div>
        </div>

        <div class="wrapper" id="loginPopupWrapper">
            <span class="icon-close" id="iconClosePopup">
                <ion-icon name="close-outline"></ion-icon>
            </span>
            <div class="form-box-login">
                <h2>Login</h2>
                <form id="evalLoginForm">
                    <div class="input-box">
                        <span class="icon"><ion-icon name="mail"></ion-icon></span>
                        <input type="email" id="evalLoginEmail" required>
                        <label>Email</label>
                    </div>
                    <div class="input-box">
                        <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                        <input type="password" id="evalLoginPassword" required>
                        <label>Password</label>
                    </div>
                    <div class="remember-forgot">
                        <label><input type="checkbox">Remember me</label>
                        <a href="#">Forgot Password</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>
        </div>

        <div class="evaluation-content">
            <div id="accessDeniedMessage" class="access-denied" style="display: none;">
                <div class="denied-icon">🔒</div>
                <h2>Access Restricted</h2>
                <p>Please log in with an administrator or assessor account to view the evaluation page.</p>
            </div>

            <div class="evaluation-container" style="display: none;">
                <h1>📋 Student Evaluation</h1>

                <!-- Assessor Selector (for Admin view) -->
                <div id="assessorSelectorContainer" class="assessor-selector" style="display: none;">
                    <label>👨‍🏫 Select Assessor:</label>
                    <select id="assessorDropdown" class="assessor-dropdown">
                        <option value="">-- Select an assessor --</option>
                    </select>
                </div>

                <!-- Student Selector (for Assessor view) -->
                <div id="studentSelectorContainer" class="assessor-selector" style="display: none;">
                    <label>🎓 Select Student to Evaluate:</label>
                    <select id="studentDropdown" class="assessor-dropdown">
                        <option value="">-- Select a student --</option>
                    </select>
                </div>

                <div id="studentsSection" class="students-section" style="display: none;">
                    <div class="students-title">🎓 Assigned Students</div>
                    <div id="studentsListContainer" class="students-grid"></div>
                </div>

                <!-- Marks Panel (Read-only for Admin, also used for View mode) -->
                <div id="marksDetailPanel" class="marks-panel" style="display: none;">
                    <div class="panel-header">
                        <ion-icon name="analytics-outline" style="font-size: 32px;"></ion-icon>
                        <span>Performance Breakdown</span>
                    </div>
                    <div id="marksBreakdownContainer"></div>
                    <div id="remarksSection"></div>
                    <div id="totalScoreSection"></div>
                    <div class="form-actions" id="editActionContainer" style="display: none;">
                        <button id="editEvaluationBtn" class="edit-btn">✏️ Edit Evaluation</button>
                    </div>
                </div>

                <!-- Evaluation Form (Editable for Assessor) -->
                <div id="evaluationForm" class="evaluation-form" style="display: none;">

                    <div class="criteria-container">
                        <div id="criteriaInputs"></div>
                    </div>

                    <div class="remarks-input">
                        <label for="assessorRemarks">📝 Assessor's Remarks & Feedback:</label>
                        <textarea id="assessorRemarks" rows="4"
                            placeholder="Provide detailed feedback on the student's performance..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button id="submitEvaluationBtn" class="submit-btn">✅ Submit Evaluation</button>
                        <button id="cancelEvaluationBtn" class="cancel-btn">❌ Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="constants.js"></script>
    <script src="api.js"></script>
    <script src="enhanced-features.js"></script>
    <script src="evaluation_script.js"></script>
</body>

</html>
